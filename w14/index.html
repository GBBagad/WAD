<!DOCTYPE html>
<html>
<body>

<h2>User List</h2>

<button onclick="load()">Load</button>

<div id="output"></div>

<script>
function load() {
    fetch("http://localhost:3000/api")
    .then(res => res.json())
    .then(data => {

        let text = "";

        for(let i=0; i<data.length; i++){
            text += data[i].name + " - " + data[i].email + "<br>";
        }

        document.getElementById("output").innerHTML = text;
    });
}
</script>

</body>
</html>
