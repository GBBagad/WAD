<!DOCTYPE html>
<html>
<head>
<title>Facebook Page</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- TOP BAR -->
<div class="bg-primary text-white p-3">
  <div class="container d-flex justify-content-between">
    <h3>facebook</h3>

    <div>
      <input type="text" placeholder="Email" class="me-2">
      <input type="password" placeholder="Password" class="me-2">
      <button class="btn btn-light btn-sm">Login</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="container mt-4">
  <div class="row">

    <!-- LEFT SIDE -->
    <div class="col-md-6">
      <h4>Facebook helps you connect and share</h4>
      <img src="https://via.placeholder.com/300" class="img-fluid">
    </div>

    <!-- RIGHT SIDE -->
    <div class="col-md-6">
      <h3>Create an Account</h3>

      <input class="form-control mb-2" placeholder="First name">
      <input class="form-control mb-2" placeholder="Last name">
      <input class="form-control mb-2" placeholder="Email">
      <input class="form-control mb-2" placeholder="Password">

      <label>Gender:</label><br>
      <input type="radio"> Male
      <input type="radio"> Female

      <br><br>
      <button class="btn btn-success">Sign Up</button>
    </div>

  </div>
</div>

</body>
</html>
