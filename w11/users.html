<!DOCTYPE html>
<html>
<head>
    <title>Users</title>
</head>
<body>

<h2>Users List</h2>

<table border="1">
<tr>
<th>Name</th>
<th>Email</th>
<th>Mobile</th>
</tr>

<tbody id="data"></tbody>
</table>

<script>
var users = JSON.parse(localStorage.getItem("users")) || [];

var output = "";

for(var i=0; i<users.length; i++) {
    output += "<tr>" +
        "<td>" + users[i].name + "</td>" +
        "<td>" + users[i].email + "</td>" +
        "<td>" + users[i].mobile + "</td>" +
        "</tr>";
}

document.getElementById("data").innerHTML = output;
</script>

</body>
</html>
