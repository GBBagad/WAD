<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
</head>
<body>

<h2>Products</h2>

<button onclick="load()">Load</button>

<div id="data"></div>

<script>
function load() {
    fetch("http://localhost:3000/products")
    .then(res => res.json())
    .then(d => {
        let out = "";

        d.forEach(p => {
            out += p.name + " - ₹" + p.price + "<br>";
        });

        document.getElementById("data").innerHTML = out;
    });
}
</script>

</body>
</html>
