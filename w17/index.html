<!DOCTYPE html>
<html>
<body>

<h2>Employee List</h2>

<button onclick="load()">Load</button>

<div id="out"></div>

<script>
function load() {

    fetch("http://localhost:3000/data")
    .then(res => res.json())
    .then(d => {

        let text = "";

        for(let i=0;i<d.length;i++){
            text += 
            "Name: " + d[i].name + "<br>" +
            "Designation: " + d[i].designation + "<br>" +
            "Department: " + d[i].department + "<br>" +
            "Salary: ₹" + d[i].salary + "<br><br>";
        }

        document.getElementById("out").innerHTML = text;
    });
}
</script>

</body>
</html>
